services:
  postgres:
    image: postgres:16-alpine
    container_name: zoi_postgres
    environment:
      POSTGRES_USER: zoi
      POSTGRES_PASSWORD: zoi
      POSTGRES_DB: zoi_agent
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoi -d zoi_agent"]
      interval: 5s
      timeout: 3s
      retries: 10
